name: release

# Release model: the chart `version` in Chart.yaml is the source of truth.
# When a commit on `main` changes it to a version that has no tag yet, CI tags
# it, writes release notes (git-cliff), and publishes to GitHub Packages (OCI).
# CI never pushes to `main` — the tag/release/artifact are the only outputs.
on:
  push:
    branches: [main]
    paths: ["charts/hermes-agent-helm/Chart.yaml"]
  workflow_dispatch:

permissions:
  contents: write   # create tag + GitHub Release
  packages: write   # push to ghcr

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags for git-cliff and the tag guard

      - name: Resolve chart version
        id: ver
        run: |
          VER="$(grep -E '^version:' charts/hermes-agent-helm/Chart.yaml | awk '{print $2}' | tr -d '"')"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/v$VER" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::v$VER already released — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes (git-cliff)
        if: steps.ver.outputs.exists == 'false'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag v${{ steps.ver.outputs.version }} --strip all
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create tag + GitHub Release
        if: steps.ver.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          body_path: RELEASE_NOTES.md

      - name: Setup Helm
        if: steps.ver.outputs.exists == 'false'
        uses: azure/setup-helm@v4

      - name: Package & push to ghcr (OCI)
        if: steps.ver.outputs.exists == 'false'
        run: |
          helm package charts/hermes-agent-helm --destination dist/
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm push dist/hermes-agent-helm-*.tgz "oci://ghcr.io/${{ github.repository_owner }}"
