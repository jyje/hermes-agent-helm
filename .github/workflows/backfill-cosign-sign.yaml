name: 🔏 backfill-cosign-sign

# One-off utility: sign every already-published chart version with cosign
# (keyless) so Artifact Hub shows them all as "Signed", matching what
# release-chart.yaml now does automatically for every new release. Delete this
# file once it has been run successfully.
on:
  workflow_dispatch:
    inputs:
      versions:
        description: "Space-separated chart versions to sign"
        type: string
        default: "0.1.0 0.1.1 0.2.0 0.3.0 0.3.1 0.4.0 0.4.1"

permissions:
  id-token: write   # mint a Sigstore OIDC token for keyless cosign signing
  packages: write   # push the signature alongside the chart on ghcr

jobs:
  sign:
    runs-on: ubuntu-26.04-arm
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to ghcr
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Sign each version (keyless, Sigstore)
        run: |
          for v in ${{ inputs.versions }}; do
            echo "::group::sign $v"
            cosign sign --yes "ghcr.io/${{ github.repository }}/hermes-agent:${v}"
            echo "::endgroup::"
          done
