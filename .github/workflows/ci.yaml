name: ci

on:
  pull_request:
    paths:
      - "charts/hermes-agent/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [dev, main]
    paths:
      - "charts/hermes-agent/**"
      - ".github/workflows/ci.yml"

jobs:
  lint:
    runs-on: ubuntu-26.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - name: helm lint
        run: helm lint charts/hermes-agent --set env.OPENAI_API_KEY=sk-test

      - name: helm template
        run: |
          helm template hermes-agent charts/hermes-agent \
            --set-string env.OPENAI_API_KEY=sk-test > /dev/null

      - name: install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          arch=$(uname -m); case "$arch" in aarch64) arch=arm64 ;; esac
          curl -sSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_${arch}.tar.gz" \
            | tar -xz helm-docs
          sudo install helm-docs /usr/local/bin/

      - name: helm-docs is up to date
        run: |
          helm-docs --chart-search-root=charts --template-files=README.md.gotmpl
          git diff --exit-code charts/hermes-agent/README.md \
            || { echo "::error::charts/hermes-agent/README.md is stale — run 'make docs' and commit"; exit 1; }

  test:
    # Isolated install + test on an ephemeral kind cluster (no real cluster).
    # If an NVIDIA_API_KEY secret is present (non-fork runs), also do a real model
    # round-trip through NVIDIA NIM; otherwise doctor-only. NIM is used (rather
    # than Gemini) because its free tier has enough headroom for repeated CI runs
    # without hitting per-day quota errors.
    #
    # CI_MODELS is a pool of small/free NIM models (same provider/credentials,
    # different model ids). The test Job tries each via `hermes chat -m <model>`
    # with a per-model timeout (tests.chat.timeout) and passes as soon as one
    # succeeds, since any single free-tier model can be flaky/overloaded.
    runs-on: ubuntu-26.04-arm
    timeout-minutes: 15
    env:
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      CI_MODELS: "nvidia/nemotron-3-nano-omni-30b-a3b-reasoning,google/gemma-4-31b-it,openai/gpt-oss-20b"
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - uses: helm/kind-action@v1

      - name: Install chart (NVIDIA NIM if a key is available, else placeholder)
        run: |
          if [ -n "$NVIDIA_API_KEY" ]; then
            echo "Installing with NVIDIA NIM provider, model pool: $CI_MODELS"
            helm upgrade --install hermes-agent charts/hermes-agent \
              --namespace hermes-agent --create-namespace \
              --set config.model.provider=nvidia \
              --set-string config.model.default="${CI_MODELS%%,*}" \
              --set-string env.NVIDIA_API_KEY="$NVIDIA_API_KEY" \
              --set-string env.OPENAI_API_KEY=unused \
              --set tests.chat.enabled=true \
              --set tests.chat.failOnError=true \
              --set "tests.chat.models={$CI_MODELS}" \
              --wait --timeout 5m
          else
            echo "No NVIDIA_API_KEY secret — installing with placeholder (doctor-only)"
            helm upgrade --install hermes-agent charts/hermes-agent \
              --namespace hermes-agent --create-namespace \
              --set-string env.OPENAI_API_KEY=sk-test \
              --wait --timeout 5m
          fi

      - name: Run install test (hermes doctor, + chat round-trip if a model key is available)
        timeout-minutes: 6
        run: |
          # The chart's test is a Helm hook Job. We deliberately do NOT use
          # `helm test`: its hook create+watch can stall for many minutes on a
          # CI runner (observed: ~12m before the Job was even created). Instead,
          # render the same Job from the installed release (real values) and run
          # it directly, then poll its status — creation is immediate and timing
          # is deterministic.
          ns=hermes-agent
          job=hermes-agent-test

          helm get hooks hermes-agent -n "$ns" > /tmp/test-hooks.yaml
          kubectl delete job "$job" -n "$ns" --ignore-not-found
          kubectl create -n "$ns" -f /tmp/test-hooks.yaml

          # Pass on Complete, fail on Failed (whichever the Job reaches first).
          result=timeout
          for _ in $(seq 1 150); do
            conds=$(kubectl get job "$job" -n "$ns" \
              -o jsonpath='{.status.conditions[?(@.status=="True")].type}' 2>/dev/null || true)
            case "$conds" in
              *Complete*) result=success; break ;;
              *Failed*)   result=failed;  break ;;
            esac
            sleep 2
          done

          echo "test job result: $result"
          [ "$result" = success ]

      - name: Show test logs (incl. chat round-trip transcript)
        if: always()
        run: kubectl logs -n hermes-agent -l app.kubernetes.io/component=test --tail=-1

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -n hermes-agent -o wide || true
          kubectl logs -n hermes-agent -l app.kubernetes.io/component=test --tail=-1 || true
          kubectl logs -n hermes-agent -l app.kubernetes.io/name=hermes-agent --tail=-1 || true
