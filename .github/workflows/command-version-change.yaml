name: ⚡ version-change

# ChatOps trigger: a maintainer comments `/version vX.Y.Z` on the release
# proposal PR (branch release/next) to override the recommended version.
# Re-runs propose-release.yaml with that exact version, which regenerates the
# whole proposal (Chart.yaml bump, CHANGELOG.md, chart docs, and the PR body —
# including the "maintainer override / AI suggestion (not taken)" table) in
# place (idempotent — same release/next branch + PR).
on:
  issue_comment:
    types: [created]

permissions:
  actions: write
  pull-requests: write

jobs:
  override:
    if: |
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/version ') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-26.04-arm
    steps:
      - name: Parse version from comment
        id: parse
        run: |
          VER=$(echo "${{ github.event.comment.body }}" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ -z "$VER" ]; then
            echo "::error::could not parse a semver from comment (expected '/version vX.Y.Z')"
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Require the release proposal PR
        uses: actions/github-script@v9
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const isRelease = pr.data.labels.some(l => l.name === 'release')
              || /release proposal/i.test(pr.data.title);
            if (!isRelease) {
              core.setFailed('`/version` is only valid on the release proposal PR');
            }

      - name: Re-trigger propose-release.yaml with the chosen version
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'propose-release.yaml',
              ref: 'main',
              inputs: { version: '${{ steps.parse.outputs.version }}' },
            });

      - name: React to comment
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });
