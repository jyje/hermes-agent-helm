name: ⚡ version-change

# ChatOps trigger: a maintainer comments `/version vX.Y.Z` on a PR. This bumps
# `version` in charts/hermes-agent/Chart.yaml, refreshes CHANGELOG.md
# (git-cliff), and pushes the commit to the PR branch. Merging that PR to
# `main` then triggers release-chart.yaml (tag + GitHub Release + OCI push).
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    if: |
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/version ') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-26.04-arm
    steps:
      - name: Parse version from comment
        id: parse
        run: |
          VER=$(echo "${{ github.event.comment.body }}" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ -z "$VER" ]; then
            echo "::error::could not parse a semver from comment (expected '/version vX.Y.Z')"
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Resolve PR head
        id: pr
        uses: actions/github-script@v9
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            if (pr.data.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              core.setFailed('refusing to push to a fork-owned PR branch');
              return;
            }
            core.setOutput('ref', pr.data.head.ref);

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.ref }}
          fetch-depth: 0

      - name: Install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          arch=$(uname -m); case "$arch" in aarch64) arch=arm64 ;; esac
          curl -sSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_${arch}.tar.gz" \
            | tar -xz helm-docs
          sudo install helm-docs /usr/local/bin/

      - name: Bump Chart.yaml version + refresh CHANGELOG.md + chart docs
        run: |
          ver="${{ steps.parse.outputs.version }}"
          sed -i "s/^version: .*/version: ${ver}/" charts/hermes-agent/Chart.yaml
          # Keep the chart README's version badge in sync so validate-chart.yaml's docs-drift
          # check passes on the PR.
          helm-docs --chart-search-root=charts --template-files=README.md.gotmpl

      - name: Update CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag v${{ steps.parse.outputs.version }} -o CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ github.token }}   # lets git-cliff resolve @usernames

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/hermes-agent/Chart.yaml charts/hermes-agent/README.md CHANGELOG.md
          git commit -m "chore(release): bump chart version to ${{ steps.parse.outputs.version }}"
          git push origin HEAD:${{ steps.pr.outputs.ref }}

      - name: Sync release PR title to the chosen version
        uses: actions/github-script@v9
        with:
          script: |
            const ver = '${{ steps.parse.outputs.version }}';
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            // Only retitle the release proposal PR, not arbitrary feature PRs.
            const isRelease = pr.data.labels.some(l => l.name === 'release')
              || /Release v/i.test(pr.data.title);
            if (isRelease) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                title: `🚀 Release v${ver}`,
              });
              core.info(`retitled PR #${context.issue.number} -> 🚀 Release v${ver}`);
            }

      - name: React to comment
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });
