name: ci

on:
  pull_request:
    paths:
      - "charts/hermes-agent/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [dev, main]
    paths:
      - "charts/hermes-agent/**"
      - ".github/workflows/ci.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - name: helm lint
        run: helm lint charts/hermes-agent --set env.OPENAI_API_KEY=sk-test

      - name: helm template
        run: |
          helm template hermes-agent charts/hermes-agent \
            --set-string env.OPENAI_API_KEY=sk-test > /dev/null

      - name: install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          curl -sSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz helm-docs
          sudo install helm-docs /usr/local/bin/

      - name: helm-docs is up to date
        run: |
          helm-docs --chart-search-root=charts --template-files=README.md.gotmpl
          git diff --exit-code charts/hermes-agent/README.md \
            || { echo "::error::charts/hermes-agent/README.md is stale — run 'make docs' and commit"; exit 1; }

  test:
    # Isolated install + helm test on an ephemeral kind cluster (no real cluster).
    # If an NVIDIA_API_KEY secret is present (non-fork runs), also do a real model
    # round-trip through NVIDIA NIM; otherwise doctor-only. NIM is used (rather
    # than Gemini) because its free tier has enough headroom for repeated CI runs
    # without hitting per-day quota errors.
    #
    # CI_MODELS is a pool of small/free NIM models (same provider/credentials,
    # different model ids). The test Job tries each via `hermes chat -m <model>`
    # with a per-model timeout (tests.chat.timeout) and passes as soon as one
    # succeeds, since any single free-tier model can be flaky/overloaded.
    runs-on: ubuntu-latest
    env:
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      CI_MODELS: "nvidia/nemotron-3-nano-omni-30b-a3b-reasoning,google/gemma-4-31b-it,openai/gpt-oss-20b"
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - uses: helm/kind-action@v1

      - name: Install chart (NVIDIA NIM if a key is available, else placeholder)
        run: |
          if [ -n "$NVIDIA_API_KEY" ]; then
            echo "Installing with NVIDIA NIM provider, model pool: $CI_MODELS"
            helm upgrade --install hermes-agent charts/hermes-agent \
              --namespace hermes-agent --create-namespace \
              --set config.model.provider=nvidia \
              --set-string config.model.default="${CI_MODELS%%,*}" \
              --set-string env.NVIDIA_API_KEY="$NVIDIA_API_KEY" \
              --set-string env.OPENAI_API_KEY=unused \
              --set tests.chat.enabled=true \
              --set tests.chat.failOnError=true \
              --set "tests.chat.models={$CI_MODELS}" \
              --wait --timeout 12m
          else
            echo "No NVIDIA_API_KEY secret — installing with placeholder (doctor-only)"
            helm upgrade --install hermes-agent charts/hermes-agent \
              --namespace hermes-agent --create-namespace \
              --set-string env.OPENAI_API_KEY=sk-test \
              --wait --timeout 12m
          fi

      - name: Helm test (hermes doctor, + chat round-trip if a model key is available)
        run: |
          # `helm test`'s internal Job-watch can wait out the full --timeout even
          # after the test Job has already succeeded (a watch/resync race for
          # fast-finishing Jobs). Run it in the background and poll the Job's
          # status directly so we move on as soon as it actually completes,
          # while keeping --timeout as the failure fallback.
          echo "runner date: $(date -u)"
          helm test hermes-agent -n hermes-agent --timeout 12m &
          helm_pid=$!

          job=""
          for i in $(seq 1 60); do
            job=$(kubectl get job -n hermes-agent -l app.kubernetes.io/component=test \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [ -n "$job" ]; then
              echo "found job/$job after ${i}s (runner date: $(date -u))"
              break
            fi
            if [ $((i % 10)) -eq 0 ]; then
              echo "::group::debug: no test job yet after ${i}s (runner date: $(date -u))"
              kubectl get jobs,pods -n hermes-agent -o wide --show-labels || true
              kubectl get events -n hermes-agent --sort-by=.lastTimestamp || true
              echo "::endgroup::"
            fi
            sleep 1
          done
          if [ -z "$job" ]; then
            echo "::error::test Job not found"
            echo "::group::debug: final cluster state (runner date: $(date -u))"
            kubectl get jobs,pods -n hermes-agent -o wide --show-labels || true
            kubectl get events -n hermes-agent --sort-by=.lastTimestamp || true
            echo "::endgroup::"
            wait "$helm_pid" || true
            echo "helm test exited (runner date: $(date -u))"
            exit 1
          fi

          echo "Watching job/$job"
          result=""
          for i in $(seq 1 360); do
            succeeded=$(kubectl get job "$job" -n hermes-agent -o jsonpath='{.status.succeeded}' 2>/dev/null || true)
            failed=$(kubectl get job "$job" -n hermes-agent -o jsonpath='{.status.failed}' 2>/dev/null || true)
            if [ "$succeeded" = "1" ]; then result=success; break; fi
            if [ "$failed" = "1" ]; then result=failed; break; fi
            sleep 2
          done
          echo "job/$job result: ${result:-timeout} after $((i * 2))s (runner date: $(date -u))"

          kill "$helm_pid" 2>/dev/null || true
          wait "$helm_pid" 2>/dev/null || true

          [ "$result" = "success" ]

      - name: Show test logs (incl. chat round-trip transcript)
        if: always()
        run: kubectl logs -n hermes-agent -l app.kubernetes.io/component=test --tail=-1

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -n hermes-agent -o wide || true
          kubectl logs -n hermes-agent -l app.kubernetes.io/component=test --tail=-1 || true
          kubectl logs -n hermes-agent -l app.kubernetes.io/name=hermes-agent --tail=-1 || true
