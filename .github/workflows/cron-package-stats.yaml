name: 📊 cron-package-stats

# Publishes a shields.io "endpoint" badge JSON for the GHCR (GitHub Container
# Registry) package's total download count. GitHub only renders that number
# on the package's web page (github.com/.../pkgs/container/...); there is no
# public, unauthenticated API for it — the REST packages API omits it
# entirely, and the GraphQL `Package.statistics.downloadsTotalCount` field
# needs a token with the `Packages: Read` permission. Since shields.io badges
# are fetched anonymously, we can't point it at an authenticated GraphQL call
# directly — instead this job resolves the number with a GitHub App token
# once a day and caches it as a small JSON file on `gh-pages`, which
# shields.io's `endpoint` badge type reads over plain HTTP(S).
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  PACKAGE_NAME: 'hermes-agent-helm/hermes-agent'

jobs:
  update-badge:
    name: 🔄 Refresh GHCR downloads badge
    runs-on: ubuntu-26.04-arm
    steps:
      # The default GITHUB_TOKEN has no Packages:Read scope for GraphQL
      # statistics; the repo's GitHub App may — see the troubleshooting note
      # below if this comes back empty.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Query GHCR total downloads (GraphQL)
        id: query
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set +e
          RESP=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $pkg: [String!]) {
              repository(owner: $owner, name: $repo) {
                packages(first: 1, names: $pkg) {
                  nodes { statistics { downloadsTotalCount } }
                }
              }
            }' \
            -f owner="${{ github.repository_owner }}" \
            -f repo="${{ github.event.repository.name }}" \
            -F pkg[]="${PACKAGE_NAME}" 2>&1)
          set -e

          COUNT=$(echo "$RESP" | jq -r '.data.repository.packages.nodes[0].statistics.downloadsTotalCount // empty' 2>/dev/null)

          if [ -z "$COUNT" ]; then
            echo "::warning::Could not read downloadsTotalCount — response: $RESP"
            echo "::warning::Most likely cause: the GitHub App (secrets.APP_ID) is missing the 'Packages: Read' repository permission. Grant it under the App's settings (Permissions & events > Repository permissions > Packages: Read-only), then re-approve the installation on this repo."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Total downloads: $COUNT"
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout gh-pages
        if: steps.query.outputs.skip != 'true'
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: gh-pages

      - name: Write shields.io endpoint badge JSON
        if: steps.query.outputs.skip != 'true'
        run: |
          mkdir -p gh-pages/badges
          cat > gh-pages/badges/ghcr-downloads.json <<EOF
          {
            "schemaVersion": 1,
            "label": "GHCR downloads",
            "message": "${{ steps.query.outputs.count }}",
            "color": "blue"
          }
          EOF

      - name: Commit and push (skip if unchanged)
        if: steps.query.outputs.skip != 'true'
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/ghcr-downloads.json
          if git diff --cached --quiet; then
            echo "No change in download count — nothing to commit."
            exit 0
          fi
          git commit -m "chore(badge): refresh GHCR downloads count"
          git push origin gh-pages
