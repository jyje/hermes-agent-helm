name: 🔍 validate-chart

on:
  pull_request:
    paths:
      - "charts/hermes-agent/**"
      - ".github/workflows/validate-chart.yaml"
  push:
    branches: [dev, main]
    paths:
      - "charts/hermes-agent/**"
      - ".github/workflows/validate-chart.yaml"

jobs:
  changes:
    # Detects whether this push/PR only touches Chart.yaml's version (plus the
    # generated docs/changelog that follow it) — a release-bump commit. In that
    # case the chart's behavior is unchanged, so the heavy `test` job below
    # (ephemeral kind cluster + real round-trip) is skipped.
    runs-on: ubuntu-26.04-arm
    outputs:
      functional: ${{ steps.filter.outputs.functional }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: filter
        run: |
          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$base" ] || ! git cat-file -e "$base" 2>/dev/null; then
            echo "functional=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "$base" "${{ github.sha }}")"
          echo "Changed files:"
          echo "$changed"
          if echo "$changed" | grep -vE '^(charts/hermes-agent/(Chart\.yaml|README\.md)|examples/helm/README\.md|CHANGELOG\.md)$' | grep -q .; then
            echo "functional=true" >> "$GITHUB_OUTPUT"
          else
            echo "functional=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    runs-on: ubuntu-26.04-arm
    steps:
      - uses: actions/checkout@v7

      - uses: azure/setup-helm@v5

      - name: helm lint
        run: helm lint charts/hermes-agent --set env.OPENAI_API_KEY=sk-test

      - name: helm template
        run: |
          helm template hermes-agent charts/hermes-agent \
            --set-string env.OPENAI_API_KEY=sk-test > /dev/null

      - name: install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          arch=$(uname -m); case "$arch" in aarch64) arch=arm64 ;; esac
          curl -sSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_${arch}.tar.gz" \
            | tar -xz helm-docs
          sudo install helm-docs /usr/local/bin/

      - name: helm-docs is up to date
        run: |
          helm-docs --chart-search-root=charts --template-files=README.md.gotmpl
          git diff --exit-code charts/hermes-agent/README.md \
            || { echo "::error::charts/hermes-agent/README.md is stale — run 'make docs' and commit"; exit 1; }

  test:
    # Each matrix entry gets its OWN ephemeral kind cluster (a separate
    # runner), so the two scenarios are fully isolated — no shared cluster,
    # no namespace partitioning, no background-process plumbing. Scenario
    # logic lives in .github/scripts/{lib,scenario-*}.sh. If an
    # NVIDIA_API_KEY secret is present (non-fork runs), the message scenario
    # also does a real model round-trip through NVIDIA NIM; otherwise
    # doctor-only. NIM is used (rather than Gemini) because its free tier has
    # enough headroom for repeated CI runs without hitting per-day quota
    # errors.
    #
    # CI_MODELS is a pool of small/free NIM models (same provider/credentials,
    # different model ids). The message scenario tries each via
    # `hermes chat -m <model>` and passes as soon as one succeeds, since any
    # single free-tier model can be flaky — this is a FAILOVER pool, not
    # exhaustive per-model testing.
    needs: changes
    if: needs.changes.outputs.functional == 'true'
    strategy:
      fail-fast: false
      matrix:
        scenario: [message, existing-claim]
    runs-on: ubuntu-26.04-arm
    timeout-minutes: 15
    env:
      NS: test-hermes-chart
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      CI_MODELS: "nvidia/nemotron-3-nano-omni-30b-a3b-reasoning,google/gemma-4-31b-it,openai/gpt-oss-20b"
      # Optional live Discord verification: only scenario-message.sh ever
      # uses these (it's the only scenario installing Discord), so they're
      # simply unread on the existing-claim job.
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      DISCORD_HOME_CHANNEL: ${{ secrets.DISCORD_HOME_CHANNEL }}
    steps:
      - uses: actions/checkout@v7

      - uses: azure/setup-helm@v5

      - uses: helm/kind-action@v1

      - name: Run ${{ matrix.scenario }} scenario
        timeout-minutes: 12
        run: .github/scripts/scenario-${{ matrix.scenario }}.sh

      - name: Notify Discord and verify delivery (message scenario, trusted runs with a token)
        # Full live round-trip: send the "CI healthy" message via `hermes send`
        # from the message-scenario workload (no gateway loop needed for
        # bot-token platforms), then read the channel back through the Discord
        # API and confirm our unique marker is present. This GATES on trusted
        # runs — if the send fails or the message can't be verified, CI fails.
        # Fork PRs skip it (no secret). The bot needs View Channel + Read Message
        # History on DISCORD_HOME_CHANNEL for the read-back. Only this scenario
        # installs Discord, and only this job's own success() is checked — it
        # does not wait on the existing-claim job (GitHub Actions' own check
        # status already reports overall pass/fail across the matrix).
        if: matrix.scenario == 'message' && success() && env.DISCORD_BOT_TOKEN != '' && env.DISCORD_HOME_CHANNEL != ''
        run: |
          set -euo pipefail
          pod=$(kubectl get pod -n test-hermes-chart -l app.kubernetes.io/name=hermes-agent \
            -o jsonpath='{.items[0].metadata.name}')
          nonce="ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          msg="✅ hermes-agent chart CI passed — ${GITHUB_REF_NAME} @ ${GITHUB_SHA:0:7} [${nonce}]"
          echo "Sending via workload pod: $pod"
          kubectl exec -n test-hermes-chart "$pod" -- hermes send --to discord "$msg"

          echo "Verifying delivery by reading the channel back…"
          ok=false
          for _ in $(seq 1 10); do
            sleep 3
            code=$(curl -sS -o /tmp/discord-msgs.json -w '%{http_code}' \
              -H "Authorization: Bot ${DISCORD_BOT_TOKEN}" \
              "https://discord.com/api/v10/channels/${DISCORD_HOME_CHANNEL}/messages?limit=20" \
              || echo "000")
            if [ "$code" != "200" ]; then
              echo "  read-back HTTP $code (bot needs View Channel + Read Message History); retrying…"
              continue
            fi
            if jq -e --arg n "$nonce" '.[] | select(.content | contains($n))' \
                /tmp/discord-msgs.json >/dev/null 2>&1; then
              ok=true; break
            fi
            echo "  marker not visible yet; retrying…"
          done
          if [ "$ok" != "true" ]; then
            echo "::error::Discord message was sent but could not be verified in the channel"
            exit 1
          fi
          echo "Verified: the CI notification is present in the Discord channel."

      - name: Show test logs
        if: always()
        run: |
          kubectl logs -n test-hermes-chart -l app.kubernetes.io/component=test --tail=-1 || true
          kubectl logs -n test-hermes-chart -l app.kubernetes.io/name=hermes-agent --tail=-1 || true

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -n test-hermes-chart -o wide || true
          kubectl describe pods -n test-hermes-chart || true
          kubectl logs -n test-hermes-chart -l app.kubernetes.io/component=test --tail=-1 || true
          kubectl logs -n test-hermes-chart -l app.kubernetes.io/name=hermes-agent --tail=-1 || true
