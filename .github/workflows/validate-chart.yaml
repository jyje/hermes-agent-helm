name: 🔍 validate-chart

on:
  pull_request:
    paths:
      - "charts/hermes-agent/**"
      - ".github/workflows/validate-chart.yaml"
  push:
    branches: [dev, main]
    paths:
      - "charts/hermes-agent/**"
      - ".github/workflows/validate-chart.yaml"

jobs:
  changes:
    # Detects whether this push/PR only touches Chart.yaml's version (plus the
    # generated docs/changelog that follow it) — a release-bump commit. In that
    # case the chart's behavior is unchanged, so the heavy `test` job below
    # (ephemeral kind cluster + real round-trip) is skipped.
    runs-on: ubuntu-26.04-arm
    outputs:
      functional: ${{ steps.filter.outputs.functional }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: filter
        run: |
          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$base" ] || ! git cat-file -e "$base" 2>/dev/null; then
            echo "functional=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "$base" "${{ github.sha }}")"
          echo "Changed files:"
          echo "$changed"
          if echo "$changed" | grep -vE '^(charts/hermes-agent/(Chart\.yaml|README\.md)|CHANGELOG\.md)$' | grep -q .; then
            echo "functional=true" >> "$GITHUB_OUTPUT"
          else
            echo "functional=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    runs-on: ubuntu-26.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - name: helm lint
        run: helm lint charts/hermes-agent --set env.OPENAI_API_KEY=sk-test

      - name: helm template
        run: |
          helm template hermes-agent charts/hermes-agent \
            --set-string env.OPENAI_API_KEY=sk-test > /dev/null

      - name: install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          arch=$(uname -m); case "$arch" in aarch64) arch=arm64 ;; esac
          curl -sSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_${arch}.tar.gz" \
            | tar -xz helm-docs
          sudo install helm-docs /usr/local/bin/

      - name: helm-docs is up to date
        run: |
          helm-docs --chart-search-root=charts --template-files=README.md.gotmpl
          git diff --exit-code charts/hermes-agent/README.md \
            || { echo "::error::charts/hermes-agent/README.md is stale — run 'make docs' and commit"; exit 1; }

  test:
    # Isolated install + test on an ephemeral kind cluster (no real cluster).
    # If an NVIDIA_API_KEY secret is present (non-fork runs), also do a real model
    # round-trip through NVIDIA NIM; otherwise doctor-only. NIM is used (rather
    # than Gemini) because its free tier has enough headroom for repeated CI runs
    # without hitting per-day quota errors.
    #
    # CI_MODELS is a pool of small/free NIM models (same provider/credentials,
    # different model ids). The test Job tries each via `hermes chat -m <model>`
    # with a per-model timeout (tests.chat.timeout) and passes as soon as one
    # succeeds, since any single free-tier model can be flaky/overloaded.
    needs: changes
    if: needs.changes.outputs.functional == 'true'
    runs-on: ubuntu-26.04-arm
    timeout-minutes: 15
    env:
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      CI_MODELS: "nvidia/nemotron-3-nano-omni-30b-a3b-reasoning,google/gemma-4-31b-it,openai/gpt-oss-20b"
      # Optional live Discord verification: when the bot token and home channel
      # id secrets are present on trusted runs, the workload is installed with
      # Discord enabled and, after the chart test passes, CI sends a one-shot
      # "CI healthy" message via `hermes send` and reads the channel back to
      # confirm delivery. Absent on fork PRs (secrets not exposed) → step skipped.
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      DISCORD_HOME_CHANNEL: ${{ secrets.DISCORD_HOME_CHANNEL }}
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - uses: helm/kind-action@v1

      - name: Install chart (NVIDIA NIM if a key is available, else placeholder)
        run: |
          # When a Discord bot token is available (trusted runs), enable Discord
          # on the workload so the post-test step can do a live `hermes send`.
          DISCORD_ARGS=""
          if [ -n "$DISCORD_BOT_TOKEN" ]; then
            echo "DISCORD_BOT_TOKEN present — enabling Discord on the workload"
            DISCORD_ARGS="--set-string env.DISCORD_BOT_TOKEN=$DISCORD_BOT_TOKEN"
            if [ -n "$DISCORD_HOME_CHANNEL" ]; then
              DISCORD_ARGS="$DISCORD_ARGS --set extraEnv[0].name=DISCORD_HOME_CHANNEL --set-string extraEnv[0].value=$DISCORD_HOME_CHANNEL"
            fi
          fi
          if [ -n "$NVIDIA_API_KEY" ]; then
            echo "Installing with NVIDIA NIM provider, model pool: $CI_MODELS"
            helm upgrade --install hermes-agent charts/hermes-agent \
              --namespace hermes-agent --create-namespace \
              --set config.model.provider=nvidia \
              --set-string config.model.default="${CI_MODELS%%,*}" \
              --set-string env.NVIDIA_API_KEY="$NVIDIA_API_KEY" \
              --set-string env.OPENAI_API_KEY=unused \
              --set tests.chat.enabled=true \
              --set tests.chat.failOnError=true \
              --set "tests.chat.models={$CI_MODELS}" \
              $DISCORD_ARGS \
              --wait --timeout 5m
          else
            echo "No NVIDIA_API_KEY secret — installing with placeholder (doctor-only)"
            helm upgrade --install hermes-agent charts/hermes-agent \
              --namespace hermes-agent --create-namespace \
              --set-string env.OPENAI_API_KEY=sk-test \
              $DISCORD_ARGS \
              --wait --timeout 5m
          fi

      - name: Run install test (hermes doctor, + chat round-trip if a model key is available)
        timeout-minutes: 6
        run: |
          # The chart's test is a Helm hook Job. We deliberately do NOT use
          # `helm test`: its hook create+watch can stall for many minutes on a
          # CI runner (observed: ~12m before the Job was even created). Instead,
          # render the same Job from the installed release (real values) and run
          # it directly, then poll its status — creation is immediate and timing
          # is deterministic.
          ns=hermes-agent
          job=hermes-agent-test

          helm get hooks hermes-agent -n "$ns" > /tmp/test-hooks.yaml
          kubectl delete job "$job" -n "$ns" --ignore-not-found
          kubectl create -n "$ns" -f /tmp/test-hooks.yaml

          # Pass on Complete, fail on Failed (whichever the Job reaches first).
          result=timeout
          for _ in $(seq 1 150); do
            conds=$(kubectl get job "$job" -n "$ns" \
              -o jsonpath='{.status.conditions[?(@.status=="True")].type}' 2>/dev/null || true)
            case "$conds" in
              *Complete*) result=success; break ;;
              *Failed*)   result=failed;  break ;;
            esac
            sleep 2
          done

          echo "test job result: $result"
          [ "$result" = success ]

      - name: Notify Discord and verify delivery (trusted runs with a token)
        # Full live round-trip: send the "CI healthy" message via `hermes send`
        # from the running workload (no gateway loop needed for bot-token
        # platforms), then read the channel back through the Discord API and
        # confirm our unique marker is present. This GATES on trusted runs — if
        # the send fails or the message can't be verified, CI fails. Fork PRs
        # skip it (no secret). The bot needs View Channel + Read Message History
        # on DISCORD_HOME_CHANNEL for the read-back.
        if: success() && env.DISCORD_BOT_TOKEN != '' && env.DISCORD_HOME_CHANNEL != ''
        run: |
          set -euo pipefail
          pod=$(kubectl get pod -n hermes-agent -l app.kubernetes.io/name=hermes-agent \
            -o jsonpath='{.items[0].metadata.name}')
          nonce="ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          msg="✅ hermes-agent chart CI passed — ${GITHUB_REF_NAME} @ ${GITHUB_SHA:0:7} [${nonce}]"
          echo "Sending via workload pod: $pod"
          kubectl exec -n hermes-agent "$pod" -- hermes send --to discord "$msg"

          echo "Verifying delivery by reading the channel back…"
          ok=false
          for _ in $(seq 1 10); do
            sleep 3
            code=$(curl -sS -o /tmp/discord-msgs.json -w '%{http_code}' \
              -H "Authorization: Bot ${DISCORD_BOT_TOKEN}" \
              "https://discord.com/api/v10/channels/${DISCORD_HOME_CHANNEL}/messages?limit=20" \
              || echo "000")
            if [ "$code" != "200" ]; then
              echo "  read-back HTTP $code (bot needs View Channel + Read Message History); retrying…"
              continue
            fi
            if jq -e --arg n "$nonce" '.[] | select(.content | contains($n))' \
                /tmp/discord-msgs.json >/dev/null 2>&1; then
              ok=true; break
            fi
            echo "  marker not visible yet; retrying…"
          done
          if [ "$ok" != "true" ]; then
            echo "::error::Discord message was sent but could not be verified in the channel"
            exit 1
          fi
          echo "Verified: the CI notification is present in the Discord channel."

      - name: Show test logs (incl. chat round-trip transcript)
        if: always()
        run: kubectl logs -n hermes-agent -l app.kubernetes.io/component=test --tail=-1

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -n hermes-agent -o wide || true
          kubectl logs -n hermes-agent -l app.kubernetes.io/component=test --tail=-1 || true
          kubectl logs -n hermes-agent -l app.kubernetes.io/name=hermes-agent --tail=-1 || true
