name: 🚀 release-chart

# Release model: the chart `version` in Chart.yaml is the source of truth.
# When a commit on `main` changes it to a version that has no tag yet, CI tags
# it, writes release notes (git-cliff), and publishes to GitHub Packages (OCI).
# CI never pushes to `main` — the tag/release/artifact are the only outputs.
on:
  push:
    branches: [main]
    paths: ["charts/hermes-agent/Chart.yaml"]

permissions:
  contents: write   # create tag + GitHub Release
  packages: write   # push to ghcr
  id-token: write   # mint a Sigstore OIDC token for keyless cosign signing

jobs:
  release-chart:
    runs-on: ubuntu-26.04-arm
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history + tags for git-cliff and the tag guard

      - name: Resolve chart version
        id: ver
        run: |
          VER="$(grep -E '^version:' charts/hermes-agent/Chart.yaml | awk '{print $2}' | tr -d '"')"
          NAME="$(grep -E '^name:' charts/hermes-agent/Chart.yaml | awk '{print $2}' | tr -d '"')"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "chart_name=$NAME" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/v$VER" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::v$VER already released — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog section for this version
        if: steps.ver.outputs.exists == 'false'
        run: |
          awk -v marker="[${{ steps.ver.outputs.version }}]" '
            /^## \[/ {
              if (found) exit
              if (index($0, marker) > 0) { found=1 }
              next
            }
            found { print }
          ' CHANGELOG.md > CHANGELOG_SECTION.md

      - name: Render release notes
        if: steps.ver.outputs.exists == 'false'
        run: |
          bash .github/scripts/release/render-release-notes.sh \
            "${{ github.repository }}" "${{ steps.ver.outputs.chart_name }}" \
            "${{ steps.ver.outputs.version }}" CHANGELOG_SECTION.md \
            charts/hermes-agent/Chart.yaml \
            > RELEASE_NOTES.md

      - name: Create tag + GitHub Release
        if: steps.ver.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.chart_name }} v${{ steps.ver.outputs.version }}
          body_path: RELEASE_NOTES.md

      - name: Ensure release title (action-gh-release may reuse a stale release without it)
        if: steps.ver.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release edit "v${{ steps.ver.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.ver.outputs.chart_name }} v${{ steps.ver.outputs.version }}"

      - name: Setup Helm
        if: steps.ver.outputs.exists == 'false'
        uses: azure/setup-helm@v5

      - name: Package & push to ghcr (OCI)
        if: steps.ver.outputs.exists == 'false'
        run: |
          helm package charts/hermes-agent --destination dist/
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm push dist/hermes-agent-*.tgz "oci://ghcr.io/${{ github.repository }}"

      - name: Install cosign
        if: steps.ver.outputs.exists == 'false'
        uses: sigstore/cosign-installer@v3

      - name: Sign the chart (keyless, Sigstore)
        if: steps.ver.outputs.exists == 'false'
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository }}/${{ steps.ver.outputs.chart_name }}:${{ steps.ver.outputs.version }}"

      - name: Checkout existing Helm repo index (gh-pages)
        if: steps.ver.outputs.exists == 'false'
        uses: actions/checkout@v7
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-index

      - name: Build Helm repo index
        if: steps.ver.outputs.exists == 'false'
        run: |
          mkdir -p .deploy
          cp dist/hermes-agent-*.tgz .deploy/
          if [ -f gh-pages-index/index.yaml ]; then
            helm repo index .deploy --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }} \
              --merge gh-pages-index/index.yaml
          else
            helm repo index .deploy --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          fi

      - name: Build chart doc pages
        if: steps.ver.outputs.exists == 'false'
        run: |
          chart_links=""
          for chart_dir in charts/*/; do
            [ -f "$chart_dir/Chart.yaml" ] || continue
            chart_name="$(basename "$chart_dir")"
            mkdir -p ".deploy/$chart_name"
            cp "$chart_dir/README.md" ".deploy/$chart_name/README.md"
            sed "s#{{CHART_NAME}}#$chart_name#g" pages/chart.html > ".deploy/$chart_name/index.html"

            version="$(yq '.version' "$chart_dir/Chart.yaml")"
            description="$(yq '.description' "$chart_dir/Chart.yaml" | sed -n '1p')"
            description="${description//&/&amp;}"
            description="${description//</&lt;}"
            description="${description//>/&gt;}"
            icon="$(yq '.icon // ""' "$chart_dir/Chart.yaml")"
            icon_html=""
            [ -n "$icon" ] && icon_html="<img src=\"$icon\" alt=\"\">"

            chart_links="$chart_links      <li class=\"chart-card\">
            <a href=\"./$chart_name/\">${icon_html}<span>$chart_name</span><span class=\"chart-version\">v$version</span></a>
            <p>$description</p>
          </li>
          "
          done
          content="$(cat pages/index.html)"
          content="${content//'{{CHARTS}}'/$chart_links}"
          printf '%s' "$content" > .deploy/index.html

      - name: Publish Helm repo to GitHub Pages
        if: steps.ver.outputs.exists == 'false'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .deploy
          keep_files: true

      - name: Clean up release/next branch (post-merge)
        if: always() && steps.ver.outputs.exists == 'false'
        run: |
          git push origin --delete release/next 2>/dev/null || true
