name: debug-pkg-query
on: workflow_dispatch
jobs:
  debug:
    runs-on: ubuntu-26.04-arm
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Debug queries
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "=== user(login) DOCKER ==="
          gh api graphql -f query='{ user(login: "jyje") { packages(first: 10, packageType: DOCKER) { totalCount nodes { name statistics { downloadsTotalCount } } } } }' || true
          echo "=== repository packages no filter ==="
          gh api graphql -f query='{ repository(owner: "jyje", name: "hermes-agent-helm") { packages(first: 10) { totalCount nodes { name } } } }' || true
          echo "=== token scopes check via REST ==="
          gh api /rate_limit -i 2>&1 | grep -i "x-oauth-scopes\|x-accepted" || true
