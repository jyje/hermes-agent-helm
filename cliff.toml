# git-cliff configuration — Keep a Changelog style, grouped by Conventional Commit type.
[changelog]
header = """
# Changelog

All notable changes to this chart are documented here.
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/jyje/hermes-agent-helm/commit/{{ commit.id }})) — {% if commit.remote.username %}@{{ commit.remote.username }}{% else %}{{ commit.author.name }}{% endif %}\
{% endfor %}
{% endfor %}\n
"""
trim = true

[git]
# Commit messages follow the gitmoji format: "<emoji> <type>(<domain>): <title>"
# (see .claude/skills/git-commit-helper), not bare Conventional Commits, so the
# parsers below match on the "<type>(" part after the leading emoji.
conventional_commits = false
commit_preprocessors = [
  { pattern = '\n*Co-Authored-By:.*', replace = "" },
]
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = "^\\S+\\s+init", group = "Initial Release" },
  { message = "^\\S+\\s+feat", group = "Features" },
  { message = "^\\S+\\s+(fix|bug)", group = "Bug Fixes" },
  { message = "^\\S+\\s+perf", group = "Performance" },
  { message = "^\\S+\\s+refactor", group = "Refactor" },
  { message = "^\\S+\\s+(docs|article|typo)", group = "Documentation" },
  { message = "^\\S+\\s+build", group = "Build" },
  { message = "^\\S+\\s+test", group = "Tests" },
  { message = "^\\S+\\s+security", group = "Security" },
  { message = "^\\S+\\s+remove", group = "Removed" },
  { message = "^\\S+\\s+chore\\(release\\)", skip = true },
  { message = "^\\S+\\s+(chore|dep|style)", group = "Miscellaneous" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"

# GitHub integration: maps each commit to its GitHub author so the changelog can
# show a real @username (commit.remote.username). Needs a GITHUB_TOKEN at
# generation time; without one the template falls back to the git author name.
[remote.github]
owner = "jyje"
repo = "hermes-agent-helm"
