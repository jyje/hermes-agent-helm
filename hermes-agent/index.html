<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hermes-agent — Helm chart docs</title>
  <meta name="description" content="Helm chart docs for hermes-agent, part of the hermes-agent-helm chart repository.">
  <meta name="theme-color" content="#f4f4f4">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9B%B5%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.css">
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      background-color: #f4f4f4;
      color: #1f2328;
    }
    .markdown-body {
      max-width: 880px;
      margin: 2rem auto;
      padding: 0 1.5rem 4rem;
      --fgColor-accent: #0f1689;
      --color-canvas-default: #f4f4f4;
      background-color: #f4f4f4;
    }
    .markdown-body img { height: auto; max-width: 100%; }
    .badges { margin: 0 0 1rem; }
    .badges img { height: 20px; margin-right: 4px; }
    .topbar {
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid #d0d7de;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 0.9rem;
    }
    .topbar a { color: #0f1689; text-decoration: none; }
    .topbar a:hover { text-decoration: underline; }
    .topbar .sep { color: var(--fgColor-muted, #59636e); margin: 0 0.35rem; }
    .topbar .current { color: var(--fgColor-muted, #59636e); }

    .skeleton { display: grid; gap: 0.6rem; padding-top: 0.5rem; }
    .skeleton .line {
      height: 0.9rem;
      border-radius: 4px;
      background: linear-gradient(90deg, #eaeef2 25%, #f3f5f7 37%, #eaeef2 63%);
      background-size: 400% 100%;
      animation: shimmer 1.4s ease infinite;
    }
    .skeleton .line.short { width: 40%; }
    @keyframes shimmer {
      0% { background-position: 100% 50%; }
      100% { background-position: 0 50%; }
    }
    @media (prefers-reduced-motion: reduce) {
      .skeleton .line { animation: none; }
    }

    .fetch-error {
      border: 1px solid var(--borderColor-default, #d0d7de);
      border-radius: 6px;
      padding: 1rem 1.2rem;
    }
    .fetch-error p:first-child { margin-top: 0; }

  </style>
</head>
<body>
  <div class="topbar">
    <a href="../">⛵ hermes-agent-helm</a><span class="sep">/</span><span class="current">hermes-agent</span>
  </div>
  <article class="markdown-body">
    <p class="badges">
      <a href="https://github.com/jyje/hermes-agent-helm"><img alt="GitHub repo" src="https://img.shields.io/badge/GitHub-jyje%2Fhermes--agent--helm-181717?logo=github"></a>
      <a href="https://github.com/jyje/hermes-agent-helm/blob/main/LICENSE"><img alt="License: MIT" src="https://img.shields.io/badge/License-MIT-yellow.svg"></a>
    </p>
    <div id="content">
      <div class="skeleton" aria-busy="true" aria-label="Loading hermes-agent docs">
        <div class="line" style="width: 60%; height: 1.6rem;"></div>
        <div class="line"></div>
        <div class="line"></div>
        <div class="line short"></div>
      </div>
    </div>
  </article>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const CHART_BASE = 'https://github.com/jyje/hermes-agent-helm/blob/main/charts/hermes-agent/';
    marked.use({
      walkTokens(token) {
        if ((token.type === 'link' || token.type === 'image') && token.href) {
          if (!token.href.match(/^(https?:|#|mailto:)/)) {
            try { token.href = new URL(token.href, CHART_BASE).toString(); } catch(e) {}
          }
        }
      }
    });

    fetch('./README.md')
      .then(r => { if (!r.ok) throw new Error('not found'); return r.text(); })
      .then(md => { document.getElementById('content').innerHTML = marked.parse(md); })
      .catch(() => {
        document.getElementById('content').innerHTML =
          '<div class="fetch-error">' +
          '<p>Couldn’t load the README for <strong>hermes-agent</strong>.</p>' +
          '<p><a href="https://github.com/jyje/hermes-agent-helm/tree/main/charts/hermes-agent">View it on GitHub instead</a>.</p>' +
          '</div>';
      });
  </script>
</body>
</html>
