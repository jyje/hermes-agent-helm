# Mirrors charts/hermes-agent/values-nvidia-nim-and-discord.yaml, PLUS the
# GitOps secret-delivery pattern: a SealedSecret (rendered via extraResources)
# that the sealed-secrets controller decrypts into a Secret, referenced via
# extraEnvFrom. Nothing here is a real secret — `encryptedData` below is a
# placeholder; replace it with your own `kubeseal` output.
#
# Full step-by-step (creating the Secret, sealing it, and pasting the result
# here) is in examples/argocd/README.md — "SealedSecret walkthrough".
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # KEEP IT EQUAL TO spec.source.helm.releaseName below.
  name: hermes-agent-nvidia-nim-and-discord-sealedsecret
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ghcr.io/jyje/hermes-agent-helm
    chart: hermes-agent
    # "*" tracks the latest published chart version (semver range supported
    # for Helm/OCI sources). Pin to an exact version (e.g. "0.1.1") for
    # reproducible/controlled upgrades.
    targetRevision: "*"
    helm:
      # MUST equal metadata.name (see examples/argocd/README.md).
      releaseName: hermes-agent-nvidia-nim-and-discord-sealedsecret
      valuesObject:
        # Keep the rendered resource names short and readable
        # (hermes-agent, hermes-agent-env, hermes-agent-0, ...) instead of
        # repeating the long Application/release name on every resource. Only
        # run ONE Application with fullnameOverride: hermes-agent per
        # namespace — see "The one rule" in examples/argocd/README.md.
        fullnameOverride: hermes-agent
        config:
          model:
            # Built-in provider key for NVIDIA NIM (build.nvidia.com).
            provider: nvidia
            # NIM model id — pick one your account can reach from build.nvidia.com.
            default: nvidia/nemotron-3-nano-omni-30b-a3b-reasoning
          terminal:
            backend: local
        # Keep the chart's own Secret a harmless placeholder; the SealedSecret
        # below decrypts into hermes-agent-nim-discord-sealedsecret-secrets, and
        # extraEnvFrom (applied AFTER the chart's own envFrom) overrides it.
        env:
          NVIDIA_API_KEY: "set-via-extraEnvFrom"
          # The chart's default placeholder is for OpenAI; this deployment
          # doesn't use it. Set to a clear sentinel so no real OpenAI key is implied.
          OPENAI_API_KEY: "unused"
          # Setting the token is enough to auto-enable Discord — no config.yaml
          # change. Create the bot at https://discord.com/developers/applications,
          # enable the "Message Content Intent", and invite it to your server.
          DISCORD_BOT_TOKEN: "set-via-extraEnvFrom"
        extraEnvFrom:
          - secretRef:
              name: hermes-agent-nim-discord-sealedsecret-secrets
        # Non-secret Discord knobs — plain env, not the Secret.
        extraEnv:
          - name: DISCORD_HOME_CHANNEL        # channel id for cron / notification delivery
            value: "000000000000000000"       # DUMMY — your channel id (18 digits)
          - name: DISCORD_ALLOWED_USERS       # comma-separated user ids allowed to talk
            value: "111111111111111111"       # DUMMY — your Discord user id
          - name: DISCORD_ALLOW_ALL_USERS     # true only for throwaway/dev bots
            value: "false"
        # Persistence: empty storageClass = cluster default. On a Raspberry Pi
        # cluster that is typically local-path (k3s) or microk8s-hostpath —
        # both ReadWriteOnce, which is exactly what this single-writer
        # workload wants.
        persistence:
          enabled: true
          storageClass: ""
          accessModes:
            - ReadWriteOnce
          size: 5Gi
        # Defaults are already tuned for small arm64 nodes; shown here for visibility.
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
        extraResources:
          - apiVersion: bitnami.com/v1alpha1
            kind: SealedSecret
            metadata:
              name: hermes-agent-nim-discord-sealedsecret-secrets
              # namespace: defaults to the Application's destination namespace
              # (hermes-agent) when omitted.
            spec:
              encryptedData:
                # Replace both with `kubeseal` output for YOUR cluster — see
                # "SealedSecret walkthrough" in examples/argocd/README.md.
                NVIDIA_API_KEY: AgDUMMY_replace_with_kubeseal_output==
                DISCORD_BOT_TOKEN: AgDUMMY_replace_with_kubeseal_output==
              template:
                metadata:
                  name: hermes-agent-nim-discord-sealedsecret-secrets
                  # namespace: defaults to the Application's destination namespace
                  # (hermes-agent) when omitted.
                type: Opaque
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes-agent
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
