apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # The Application name. KEEP IT EQUAL TO spec.source.helm.releaseName below.
  name: hermes-agent
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jyje/hermes-agent-helm
    targetRevision: main
    path: charts/hermes-agent
    helm:
      # MUST equal metadata.name. This makes the chart's
      # app.kubernetes.io/instance value match the Application, and makes the
      # rendered fullname unique per instance -> no collisions even when
      # multiple Applications target the SAME namespace.
      releaseName: hermes-agent
      valuesObject:
        # Same setup as charts/hermes-agent/values-litellm-k8s.yaml: a LiteLLM
        # proxy running in the same cluster, reached via Service DNS. Swap for
        # any of the other charts/hermes-agent/values-*.yaml examples (built-in
        # providers, Discord/Telegram, ...) if you don't need a custom proxy.
        config:
          providers:
            litellm:
              base_url: http://litellm.litellm.svc.cluster.local:4000/v1
              key_env: OPENAI_API_KEY
              discover_models: true
          model:
            provider: litellm
            default: openai/gpt-oss-120b
          terminal:
            backend: local
        persistence:
          storageClass: my-storage-class
          size: 5Gi
        # Do NOT commit the API key to Git. Keep the chart Secret as a harmless
        # placeholder and inject the real key from a pre-created Secret via
        # extraEnvFrom (the later envFrom wins, overriding the placeholder).
        #   kubectl create secret generic hermes-agent-provider-key -n hermes-agent \
        #     --from-literal=OPENAI_API_KEY=<your-key>
        env:
          OPENAI_API_KEY: "set-via-extraEnvFrom"
        extraEnvFrom:
          - secretRef:
              name: hermes-agent-provider-key
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes-agent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
