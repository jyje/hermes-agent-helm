# Mirrors charts/hermes-agent/values-openai-and-telegram.yaml: OpenAI
# (api.openai.com) for the model AND a Telegram bot — both wired in one
# Application.
#
# Before applying, create the Secret this Application references:
#   kubectl create secret generic hermes-agent-openai-telegram-secrets -n hermes-agent \
#     --from-literal=OPENAI_API_KEY='sk-<real>' \
#     --from-literal=TELEGRAM_BOT_TOKEN='<real-bot-token>'
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermes-agent-openai-and-telegram
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jyje/hermes-agent-helm
    targetRevision: main
    path: charts/hermes-agent
    helm:
      releaseName: hermes-agent-openai-and-telegram
      valuesObject:
        config:
          model:
            # NOTE: the built-in key is `openai-api` (api.openai.com).
            # `openai` is NOT valid here — it aliases to OpenRouter.
            provider: openai-api
            default: gpt-4o-mini
          terminal:
            backend: local
        env:
          # Real values come from the Secret via extraEnvFrom below.
          OPENAI_API_KEY: "set-via-extraEnvFrom"
          # Setting the token is enough to auto-enable Telegram — no
          # config.yaml change. Create the bot via https://t.me/BotFather.
          TELEGRAM_BOT_TOKEN: "set-via-extraEnvFrom"
        extraEnvFrom:
          - secretRef:
              name: hermes-agent-openai-telegram-secrets
        # Non-secret Telegram knobs — plain env, not the Secret.
        extraEnv:
          - name: TELEGRAM_HOME_CHANNEL       # chat id for cron / notification delivery
            value: "000000000"                # DUMMY — your chat id
          - name: TELEGRAM_ALLOWED_USERS      # comma-separated user ids allowed to talk
            value: "111111111"                # DUMMY — your Telegram user id
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes-agent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
