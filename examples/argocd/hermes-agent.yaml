# The simplest starting point: pure chart defaults (OpenAI api.openai.com,
# gpt-4o-mini — see charts/hermes-agent/values.yaml), only wiring the
# required secret via extraEnvFrom. Copy this file and add a valuesObject
# (see the other hermes-agent-*.yaml examples) to customize provider,
# messengers, persistence, etc.
#
# Pulls the chart from the OCI registry (ghcr.io) instead of Git — see
# examples/helm/README.md for the equivalent `helm` CLI invocation. ArgoCD
# must have this OCI registry registered as a repository first
# (Settings > Repositories, type "helm", enableOCI: true; no credentials
# needed for this public chart). Bump targetRevision to track new releases.
#
# Before applying, create the Secret this Application references:
#   kubectl create secret generic hermes-agent-secrets -n hermes-agent \
#     --from-literal=OPENAI_API_KEY='sk-<real>'
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # KEEP IT EQUAL TO spec.source.helm.releaseName below.
  name: hermes-agent
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ghcr.io/jyje/hermes-agent-helm
    chart: hermes-agent
    # "*" tracks the latest published chart version (semver range supported
    # for Helm/OCI sources). Pin to an exact version (e.g. "0.1.1") for
    # reproducible/controlled upgrades.
    targetRevision: "*"
    helm:
      # MUST equal metadata.name (see examples/argocd/README.md).
      releaseName: hermes-agent
      valuesObject:
        # Real key comes from the Secret via extraEnvFrom below; this
        # placeholder is never used.
        env:
          OPENAI_API_KEY: "set-via-extraEnvFrom"
        extraEnvFrom:
          - secretRef:
              name: hermes-agent-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes-agent
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
