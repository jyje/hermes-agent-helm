# Mirrors charts/hermes-agent/values-gemini.yaml: Google Gemini.
#
# Before applying, create the Secret this Application references:
#   kubectl create secret generic hermes-agent-gemini-secrets -n hermes-agent \
#     --from-literal=GOOGLE_API_KEY='<real>'
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermes-agent-gemini
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ghcr.io/jyje/hermes-agent-helm
    chart: hermes-agent
    # "*" tracks the latest published chart version (semver range supported
    # for Helm/OCI sources). Pin to an exact version (e.g. "0.1.1") for
    # reproducible/controlled upgrades.
    targetRevision: "*"
    helm:
      releaseName: hermes-agent-gemini
      valuesObject:
        config:
          model:
            provider: gemini
            default: gemini-2.5-flash
          terminal:
            backend: local
        env:
          # Real key comes from the Secret via extraEnvFrom below.
          GOOGLE_API_KEY: "set-via-extraEnvFrom"
          # Unused by the gemini provider; overrides the chart's OpenAI placeholder.
          OPENAI_API_KEY: "unused"
        extraEnvFrom:
          - secretRef:
              name: hermes-agent-gemini-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes-agent
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
