# Mirrors charts/hermes-agent/values-openai.yaml, PLUS the GitOps
# secret-delivery pattern: a SealedSecret (rendered via extraResources) that
# the sealed-secrets controller decrypts into a Secret, referenced via
# extraEnvFrom. Nothing here is a real secret — `encryptedData` below is a
# placeholder; replace it with the output of `kubeseal` for YOUR cluster.
#
#   kubeseal --raw --scope namespace-wide \
#     --namespace hermes-agent --name hermes-agent-openai-sealedsecret-secrets \
#     --from-file=OPENAI_API_KEY=<(printf '%s' 'sk-<your-real-key>')
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # KEEP IT EQUAL TO spec.source.helm.releaseName below.
  name: hermes-agent-openai-sealedsecret
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jyje/hermes-agent-helm
    targetRevision: main
    path: charts/hermes-agent
    helm:
      # MUST equal metadata.name (see examples/argocd/README.md).
      releaseName: hermes-agent-openai-sealedsecret
      valuesObject:
        config:
          model:
            # NOTE: the built-in key is `openai-api` (api.openai.com).
            # `openai` is NOT valid here — it aliases to OpenRouter.
            provider: openai-api
            default: gpt-4o-mini
          terminal:
            backend: local
        # Keep the chart's own Secret a harmless placeholder; the SealedSecret
        # below decrypts into hermes-agent-openai-sealedsecret-secrets, and
        # extraEnvFrom (applied AFTER the chart's own envFrom) overrides it.
        env:
          OPENAI_API_KEY: "set-via-extraEnvFrom"
        extraEnvFrom:
          - secretRef:
              name: hermes-agent-openai-sealedsecret-secrets
        extraResources:
          - apiVersion: bitnami.com/v1alpha1
            kind: SealedSecret
            metadata:
              name: hermes-agent-openai-sealedsecret-secrets
              # namespace: defaults to the Application's destination namespace
              # (hermes-agent) when omitted.
            spec:
              encryptedData:
                # Replace with `kubeseal` output for YOUR cluster — see header.
                OPENAI_API_KEY: AgDUMMY_replace_with_kubeseal_output==
              template:
                metadata:
                  name: hermes-agent-openai-sealedsecret-secrets
                  # namespace: defaults to the Application's destination namespace
                  # (hermes-agent) when omitted.
                type: Opaque
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes-agent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
