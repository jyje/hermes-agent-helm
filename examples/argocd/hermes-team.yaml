# Mirrors charts/hermes-agent/values-team-leader.yaml + values-team-member.yaml:
# a LEADER-ORCHESTRATED TEAM (star topology). The leader "august" is a plain
# Application (its protocol/config is one-of-a-kind); the members are an
# ApplicationSet whose roster is DATA — adding a teammate is one list entry.
# Full walkthrough: docs/teams.md → "Leader-orchestrated teams".
#
# Control plane = one shared Discord channel; REPLY mentions flow
# leader<->member only (never member<->member). Data plane = one shared RWX
# PVC mounted at /opt/data/team on every agent, while each agent keeps its
# own private HERMES_HOME.
#
# Delegation mechanism: writing a task file IS the delegation act. A
# post_tool_call hook (config.hooks below) reads a mandatory first line
# ("Assignee: may"/"Assignee: march") from the file's CONTENT — not its
# name — and posts the Discord mention itself via the Discord REST API. This
# replaced two earlier, less reliable designs (the model @mentioning members
# itself; parsing the assignee out of the filename) — see
# values-team-leader.yaml's header for the full field-testing history.
#
# Before applying:
#   1. Create the shared RWX workspace PVC (see values-team-leader.yaml's
#      header for the manifest; RWX-capable StorageClass required).
#   2. Create one Secret per agent (one bot per agent):
#        kubectl create secret generic hermes-august-discord-secrets -n hermes-team \
#          --from-literal=NVIDIA_API_KEY='nvapi-<real>' \
#          --from-literal=DISCORD_BOT_TOKEN='<august-bot-token>'
#        # repeat for hermes-may-discord-secrets / hermes-march-discord-secrets
#      (For GitOps, wire these as SealedSecrets via extraResources instead —
#       see hermes-agent-nvidia-nim-and-discord-sealedsecret.yaml.)
#   3. Replace the DUMMY channel/user IDs and the <..._BOT_USER_ID>
#      placeholders in the environment_hints below with your roster's IDs.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermes-august            # the leader — == releaseName → unique fullname
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ghcr.io/jyje/hermes-agent-helm
    chart: hermes-agent
    targetRevision: "*"          # pin to an exact version for reproducible upgrades
    helm:
      releaseName: hermes-august
      valuesObject:
        fullnameOverride: hermes-august
        config:
          model:
            provider: nvidia
            default: z-ai/glm-5.2
          terminal:
            backend: local
          # Top-level config.yaml key (sibling of agent/model, not nested
          # under agent). Script content is the ConfigMap under
          # extraResources below; mounted via extraVolumes at /var/run/hooks.
          hooks:
            post_tool_call:
              - matcher: "write_file|patch"
                command: "sh /var/run/hooks/notify-delegation.sh"
                timeout: 10
          agent:
            # Discord is the only delegation path — internal subagents off
            # (see values-team-leader.yaml for the rationale).
            disabled_toolsets:
              - delegation
              - clarify   # interactive prompts stall the run
              - browser   # no web access needed for team coordination
              - cronjob   # team runs are event-driven via mentions — a
                          # field run turned a one-shot goal into a daily
                          # cron job instead of delegating
              - code_execution  # force direct write_file tool calls so the
                                # post_tool_call hook fires (a field run
                                # wrapped writes in an execute_code script,
                                # bypassing it) — see values-team-leader.yaml
              - skills          # no skill authoring/browsing in team work (a
                                # field run tried skill_manage to create a
                                # skill instead of delegating) — see
                                # values-team-leader.yaml
            environment_hint: |
              You are "august", the LEADER of a Hermes agent team in this
              Discord channel. Your team members, with the EXACT mention
              token to use when you reply to one of them (copy it verbatim,
              angle brackets included):
              - may   → <@MAY_BOT_USER_ID>
              - march → <@MARCH_BOT_USER_ID>
              The shared team workspace is /opt/data/team — all work
              products live there, never in chat messages.

              Two DIFFERENT things can look similar — do not confuse them:
              - TEAM COOPERATION (this): may and march are SEPARATE Hermes
                agent instances, each its own pod, own Discord bot, own
                identity, running independently of you right now. You reach
                them ONLY by writing a task file per the protocol below —
                never through a skill, never through a tool, because no tool
                or skill on this pod can reach another pod.
              - LOCAL DELEGATION (not this): your bundled skills
                "claude-code" / "codex" / "opencode" spawn an external CODING
                CLI as a SUBPROCESS INSIDE YOUR OWN POD to write code. They
                are unrelated to your team and cannot reach may or march.
                When the goal is to coordinate with your team, those skills
                are never the right tool — use the task-file protocol below
                instead.

              Protocol:
              1. When the human gives you a goal, FIRST reply with a short
                 acknowledgment stating your plan before doing anything
                 else — one or two sentences, naming the goal breakdown and
                 who gets what. Send this as its own message BEFORE writing
                 any task file, so the human sees you've understood before
                 work starts.
              2. Then split the goal into tasks (any number, any file naming
                 you like). Write each task to
                 /opt/data/team/tasks/<task-id>.md. The task-id/filename can
                 be anything descriptive — but the FILE'S FIRST LINE MUST BE
                 EXACTLY "Assignee: may" or "Assignee: march" (lowercase
                 name, no angle brackets, nothing else on that line). After
                 the Assignee line, include: goal, inputs, expected output
                 path (/opt/data/team/outputs/<task-id>/<member>/...), and
                 done criteria.
              3. Writing that task file is THE ENTIRE delegation act — a
                 system hook reads the Assignee line and notifies that
                 member automatically the instant the file is written. Do
                 NOT also @mention the member yourself for this: it doesn't
                 add anything (they're already notified) and a duplicate
                 ping just adds noise.
              4. After writing a task file, move on to the next task, or if
                 there are no more tasks, STOP and end your turn. Do NOT try
                 to read a member's output in the same turn you just
                 delegated it — no time has passed for them to work yet.
                 Only check outputs on a LATER turn (the human follows up,
                 or a member replies mentioning you).
              5. Members write only under
                 /opt/data/team/outputs/<task-id>/<member>/ and report back
                 by mentioning you — reply using their exact token from the
                 roster above. Never ask members to talk to each other.
              6. Keep the run moving: if a member asks a question or reports
                 a blocker, answer promptly in a message that mentions that
                 member. If a member stays silent on a delegated task for a
                 while, write ONE reminder task file (same Assignee-line
                 convention — this also re-notifies them); if still silent,
                 note the gap in STATUS.md and move on.
              7. Review each result against the task's done criteria. If it
                 falls short, write a follow-up task file (same
                 Assignee-line convention) with concrete feedback; then
                 accept what you have and note the gap.
              8. Track progress in /opt/data/team/STATUS.md — you are its
                 only writer.
              9. When every task is accepted, assemble the final deliverable
                 in the workspace, mark STATUS.md as DONE, and report the
                 result to the human WITHOUT mentioning any member — that
                 ends the run. Never send filler messages that mention a
                 member.
              10. /opt/data/team is already writable by you. Never use sudo
                  or try to change permissions; if a write fails, report the
                  error to the human instead of retrying workarounds.
              11. Keep every chat message SHORT — a few sentences. Work
                  products and long text live in workspace files, never in
                  chat. Never stream your step-by-step thinking into the
                  channel.
        env:
          NVIDIA_API_KEY: "set-via-extraEnvFrom"
        extraEnvFrom:
          - secretRef:
              name: hermes-august-discord-secrets
        # SHARED across the team: same channel, same users, same loop brake.
        # The member ApplicationSet below repeats this block — YAML anchors do
        # not cross the `---` document boundary.
        extraEnv:
          - { name: DISCORD_HOME_CHANNEL, value: "000000000000000000" }
          - { name: DISCORD_ALLOWED_USERS, value: "111111111111111111" }
          - { name: DISCORD_ALLOW_BOTS, value: "mentions" }
          - { name: DISCORD_THREAD_REQUIRE_MENTION, value: "true" }
          - { name: DISCORD_REPLY_TO_MODE, value: "off" }
          - { name: DISCORD_ALLOW_MENTION_REPLIED_USER, value: "false" }
          # Read by the notify-delegation.sh hook (extraResources below) to
          # resolve a member name parsed from a task file into a mention token.
          - { name: MAY_BOT_USER_ID, value: "000000000000000000" }
          - { name: MARCH_BOT_USER_ID, value: "000000000000000000" }
        # Private home (default PVC) + the shared RWX workspace + the
        # delegation-hook ConfigMap (leader only — members don't delegate).
        extraVolumes:
          - name: team-workspace
            persistentVolumeClaim:
              claimName: hermes-team-workspace
          - name: delegation-hook
            configMap:
              name: hermes-august-delegation-hook
        extraVolumeMounts:
          - name: team-workspace
            mountPath: /opt/data/team
          - name: delegation-hook
            mountPath: /var/run/hooks
            readOnly: true
        # One-time workspace prep (leader only): RWX volumes often arrive
        # root-owned; chown so the non-root agent (uid 10000) can write. Also
        # pre-seeds the shell-hook consent allowlist with EXACTLY the one
        # hook this chart registers (narrower than hooks_auto_accept: true,
        # which would blanket-approve any future hook) — the gateway has no
        # TTY to approve at, and `data` is the leader's own private-home PVC.
        extraInitContainers:
          - name: init-workspace
            image: busybox:1.37
            command:
              - sh
              - -c
              - |
                set -eu
                mkdir -p /work/tasks /work/outputs
                chown -R 10000:10000 /work
                cat > /home/shell-hooks-allowlist.json <<'JSON'
                {"approvals":[{"event":"post_tool_call","command":"sh /var/run/hooks/notify-delegation.sh","approved_at":"1970-01-01T00:00:00Z"}]}
                JSON
                chown 10000:10000 /home/shell-hooks-allowlist.json
            volumeMounts:
              - name: team-workspace
                mountPath: /work
              - name: data
                mountPath: /home
        # Delegation hook script. POSIX sh only — the image has no bash/jq,
        # but does have curl and python3 (used here for JSON, not jq).
        extraResources:
          - apiVersion: v1
            kind: ConfigMap
            metadata:
              name: hermes-august-delegation-hook
            data:
              notify-delegation.sh: |
                #!/bin/sh
                # post_tool_call hook: when the leader writes a task file
                # under /opt/data/team/tasks/*.md, deterministically post
                # the Discord delegation mention ourselves instead of
                # relying on the model to remember a second step. The
                # assignee is parsed from the file's CONTENT (a mandatory
                # "Assignee: may"/"Assignee: march" line), NOT the filename.
                set -eu

                payload="$(cat -)"
                path=$(printf '%s' "$payload" | python3 -c '
                import json, sys
                d = json.load(sys.stdin)
                print((d.get("tool_input") or {}).get("path", ""))
                ')

                case "$path" in
                  /opt/data/team/tasks/*.md) ;;
                  *) printf '{}\n'; exit 0 ;;
                esac

                [ -f "$path" ] || { printf '{}\n'; exit 0; }

                member=$(python3 -c '
                import re, sys
                try:
                    text = open(sys.argv[1], errors="ignore").read()
                except OSError:
                    sys.exit(0)
                # No trailing end-of-line anchor: the model sometimes writes
                # a literal backslash-n instead of a real newline, which a $
                # anchor would fail to match. A word boundary matches both.
                m = re.search(r"(?im)^\s*Assignee:\s*(may|march)\b", text)
                if m:
                    print(m.group(1).lower())
                ' "$path")

                member_id=""
                case "$member" in
                  may)   member_id="${MAY_BOT_USER_ID:-}" ;;
                  march) member_id="${MARCH_BOT_USER_ID:-}" ;;
                esac

                if [ -z "$member_id" ] || [ -z "${DISCORD_BOT_TOKEN:-}" ] || [ -z "${DISCORD_HOME_CHANNEL:-}" ]; then
                  printf '{}\n'; exit 0
                fi

                msg="<@${member_id}> New task assigned: ${path} - see the file for goal, expected output path, and done criteria."

                # No intermediate /tmp file: the gateway spawns this hook
                # with a more restrictive execution context than an
                # interactive test session — writing to /tmp there failed
                # with Permission denied. Piping straight into curl's stdin
                # sidesteps needing /tmp entirely.
                python3 -c '
                import json, sys
                print(json.dumps({"content": sys.argv[1]}))
                ' "$msg" | curl -sS -o /dev/null -X POST \
                  "https://discord.com/api/v10/channels/${DISCORD_HOME_CHANNEL}/messages" \
                  -H "Authorization: Bot ${DISCORD_BOT_TOKEN}" \
                  -H "Content-Type: application/json" \
                  --data-binary @- || true

                printf '{}\n'
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes-team
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: hermes-team-members
  namespace: argocd
spec:
  goTemplate: false
  generators:
    - list:
        elements:
          # The roster is DATA: add a teammate = add an entry (and create its
          # Secret + tell august about it in the leader's environment_hint).
          - name: may
            botTokenSecret: hermes-may-discord-secrets
          - name: march
            botTokenSecret: hermes-march-discord-secrets
  template:
    metadata:
      name: 'hermes-{{name}}'
    spec:
      project: default
      source:
        repoURL: ghcr.io/jyje/hermes-agent-helm
        chart: hermes-agent
        targetRevision: '*'      # pin to an exact version for reproducible upgrades
        helm:
          releaseName: 'hermes-{{name}}'
          valuesObject:
            fullnameOverride: 'hermes-{{name}}'
            config:
              model:
                provider: nvidia
                default: z-ai/glm-5.2
              terminal:
                backend: local
              agent:
                # No internal subagents — members do their tasks themselves.
                disabled_toolsets:
                  - delegation
                  - clarify   # questions go to the leader, never the human
                  - browser   # no web access needed for team coordination
                  - cronjob   # event-driven via mentions, no scheduling
                  - code_execution  # direct write_file calls only
                  - skills          # no skill authoring/browsing
                environment_hint: |
                  You are "{{name}}", a MEMBER of a Hermes agent team in
                  this Discord channel. Your leader is "august"; the EXACT
                  mention token for august is <@AUGUST_BOT_USER_ID> — copy
                  it verbatim, angle brackets included.
                  Example report message:
                  "<@AUGUST_BOT_USER_ID> done:
                  /opt/data/team/outputs/001-example/{{name}}/ — a 2-3
                  sentence summary here."
                  The shared team workspace is /opt/data/team.

                  Protocol:
                  1. Act ONLY when august mentions you with a task.
                     Otherwise stay silent — do not react to the human or to
                     other members. NEVER ask the human for input; every
                     question goes to august as a normal message containing
                     august's mention token.
                  2. Read the task file august names
                     (/opt/data/team/tasks/<task-id>.md) and satisfy its
                     done criteria. Do the work yourself — you have an
                     internal delegate_task / subagent tool, but NEVER use
                     it for team work.
                  3. Write your work ONLY under
                     /opt/data/team/outputs/<task-id>/{{name}}/. Never edit
                     tasks/, STATUS.md, or another member's output
                     directory.
                  4. EVERY message you send in this channel MUST contain
                     august's exact mention token (shown above) in the
                     BODY. Writing "august", "@august" or "@hermes-august"
                     as plain text reaches nobody and stalls the run — only
                     the exact <@...> token notifies august. Use it to hand
                     results back (output path + 2-3 sentence summary) or to
                     ask ONE blocking question — never to chat. Never
                     mention other members.
                  5. /opt/data/team is already writable by you. Never use
                     sudo or try to change permissions; if a write fails,
                     report the error to august instead of retrying
                     workarounds.
                  6. Keep every chat message SHORT — a few sentences. Work
                     products and long text live in workspace files, never
                     in chat. Never stream your step-by-step thinking into
                     the channel.
            env:
              NVIDIA_API_KEY: "set-via-extraEnvFrom"
            extraEnvFrom:
              - secretRef:
                  name: '{{botTokenSecret}}'
            extraEnv:
              - { name: DISCORD_HOME_CHANNEL, value: "000000000000000000" }
              - { name: DISCORD_ALLOWED_USERS, value: "111111111111111111" }
              - { name: DISCORD_ALLOW_BOTS, value: "mentions" }
              - { name: DISCORD_THREAD_REQUIRE_MENTION, value: "true" }
              - { name: DISCORD_REPLY_TO_MODE, value: "off" }
              - { name: DISCORD_ALLOW_MENTION_REPLIED_USER, value: "false" }
            extraVolumes:
              - name: team-workspace
                persistentVolumeClaim:
                  claimName: hermes-team-workspace
            extraVolumeMounts:
              - name: team-workspace
                mountPath: /opt/data/team
      destination:
        server: https://kubernetes.default.svc
        namespace: hermes-team
      syncPolicy:
        automated: {}
        syncOptions:
          - CreateNamespace=true
