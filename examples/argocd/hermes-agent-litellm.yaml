# Mirrors charts/hermes-agent/values-litellm.yaml: a LiteLLM proxy reachable
# over the network (outside the cluster, or via an Ingress/LoadBalancer). For
# a proxy in the SAME cluster, see hermes-agent-litellm-k8s.yaml instead.
#
# Before applying, create the Secret this Application references:
#   kubectl create secret generic hermes-agent-litellm-secrets -n hermes-agent \
#     --from-literal=OPENAI_API_KEY='sk-<your-litellm-proxy-key>'
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermes-agent-litellm
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jyje/hermes-agent-helm
    targetRevision: main
    path: charts/hermes-agent
    helm:
      releaseName: hermes-agent-litellm
      valuesObject:
        config:
          # Register the proxy as a custom OpenAI-compatible provider. The key
          # ("litellm") is the provider id referenced by model.provider below.
          providers:
            litellm:
              base_url: https://litellm.example.com/v1
              key_env: OPENAI_API_KEY      # env var that holds the proxy key
              discover_models: true        # populate the model picker from /v1/models
          model:
            provider: litellm
            # Must match a model name exposed by the proxy (see /v1/models).
            default: openai/gpt-oss-120b
          terminal:
            backend: local
        env:
          # Real proxy key comes from the Secret via extraEnvFrom below.
          OPENAI_API_KEY: "set-via-extraEnvFrom"
        extraEnvFrom:
          - secretRef:
              name: hermes-agent-litellm-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes-agent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
