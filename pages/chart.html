<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{CHART_NAME}} — Helm chart docs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown.min.css">
  <style>
    body { margin: 0; }
    .markdown-body {
      max-width: 880px;
      margin: 2rem auto;
      padding: 0 1.5rem 4rem;
    }
    .topbar {
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid #d0d7de;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .topbar a { color: #0969da; text-decoration: none; }
  </style>
</head>
<body>
  <div class="topbar"><a href="../">&larr; hermes-agent-helm chart repository</a></div>
  <article id="content" class="markdown-body">Loading {{CHART_NAME}} docs…</article>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    fetch('./README.md')
      .then(r => r.text())
      .then(md => { document.getElementById('content').innerHTML = marked.parse(md); })
      .catch(() => { document.getElementById('content').textContent = 'Failed to load README.md'; });
  </script>
</body>
</html>
