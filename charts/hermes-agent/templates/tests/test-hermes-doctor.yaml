{{- if .Values.tests.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "hermes-agent.fullname" . }}-test
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    # Helm test hook: created/run by `helm test <release>`, after install.
    "helm.sh/hook": test
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
    # ArgoCD PostSync hook: also run automatically after every ArgoCD sync.
    "argocd.argoproj.io/hook": PostSync
    "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        {{- include "hermes-agent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: test
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.bootstrap.enabled }}
      initContainers:
        # Seed the same chart config into a private HERMES_HOME so `hermes doctor`
        # evaluates what the workload runs with.
        - name: seed-config
          image: "{{ include "hermes-agent.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["sh", "-c", "cp /seed/config.yaml {{ .Values.persistence.mountPath }}/config.yaml"]
          volumeMounts:
            - name: config
              mountPath: /seed
              readOnly: true
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
      {{- end }}
      containers:
        - name: hermes-doctor
          image: "{{ include "hermes-agent.testImage" . }}"
          imagePullPolicy: {{ .Values.tests.image.pullPolicy | default .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: HERMES_HOME
              value: {{ .Values.persistence.mountPath | quote }}
          envFrom:
            - secretRef:
                name: {{ include "hermes-agent.fullname" . }}-env
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          command:
            - sh
            - -c
            - |
              set -eu
              echo "===================================================="
              echo " hermes-agent install test (doctor-style)"
              echo "===================================================="

              echo "[1/4] hermes CLI version"
              hermes --version

              echo "[2/4] seeded config.yaml present in HERMES_HOME"
              if [ -f "$HERMES_HOME/config.yaml" ]; then
                echo "  OK: $HERMES_HOME/config.yaml"
              else
                echo "  FAIL: $HERMES_HOME/config.yaml missing"; exit 1
              fi

              echo "[3/4] docker availability (local backend -> informational)"
              if command -v docker >/dev/null 2>&1; then
                docker version 2>/dev/null && echo "  docker daemon reachable" \
                  || echo "  docker CLI present, no daemon (expected: local backend)"
              else
                echo "  docker not installed (expected: terminal.backend=local)"
              fi

              echo "[4/{{ if .Values.tests.chat.enabled }}5{{ else }}4{{ end }}] hermes doctor (timeout {{ .Values.tests.doctorTimeout }}s)"
              if [ "{{ .Values.tests.doctorStrict }}" = "true" ]; then
                timeout -k 10 {{ .Values.tests.doctorTimeout }} hermes doctor
              else
                timeout -k 10 {{ .Values.tests.doctorTimeout }} hermes doctor \
                  || echo "  doctor reported issues (non-fatal: tests.doctorStrict=false)"
              fi

              {{- if .Values.tests.chat.enabled }}
              echo "[5/5] hermes chat round-trip"
              echo "--- prompt ---"
              echo {{ .Values.tests.chat.prompt | quote }}

              chat_ok=false
              {{- if .Values.tests.chat.models }}
              for model in {{ .Values.tests.chat.models | join " " }}; do
                echo "--- model: $model (timeout {{ .Values.tests.chat.timeout }}s) ---"
                set +e
                timeout -k 10 {{ .Values.tests.chat.timeout }} hermes chat \
                  -m "$model" --provider {{ .Values.config.model.provider | quote }} \
                  -q {{ .Values.tests.chat.prompt | quote }} \
                  --max-turns {{ .Values.tests.chat.maxTurns }} | tee /tmp/chat-response.txt
                chat_status=$?
                set -e
                if [ $chat_status -eq 0 ] && [ -s /tmp/chat-response.txt ]; then
                  chat_ok=true
                  echo "--- model $model succeeded ---"
                  break
                fi
                echo "--- model $model failed, trying next ---"
              done
              {{- else }}
              echo "--- model: (config default) (timeout {{ .Values.tests.chat.timeout }}s) ---"
              set +e
              timeout -k 10 {{ .Values.tests.chat.timeout }} hermes chat \
                -q {{ .Values.tests.chat.prompt | quote }} \
                --max-turns {{ .Values.tests.chat.maxTurns }} | tee /tmp/chat-response.txt
              chat_status=$?
              set -e
              [ $chat_status -eq 0 ] && [ -s /tmp/chat-response.txt ] && chat_ok=true
              {{- end }}
              echo "--- end response ---"
              if [ "{{ .Values.tests.chat.failOnError }}" = "true" ] && [ "$chat_ok" != "true" ]; then
                echo "  FAIL: hermes chat round-trip failed or returned no output"; exit 1
              fi
              {{- end }}

              echo "===================================================="
              echo " ALL REQUIRED CHECKS PASSED"
              echo "===================================================="
          resources:
            {{- toYaml .Values.tests.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
      volumes:
        {{- if .Values.bootstrap.enabled }}
        - name: config
          configMap:
            name: {{ include "hermes-agent.fullname" . }}-config
        {{- end }}
        - name: data
          emptyDir: {}
{{- end }}
