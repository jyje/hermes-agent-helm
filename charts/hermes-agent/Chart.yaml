apiVersion: v2
name: hermes-agent
description: |
  👩🏻‍💻 A Helm chart to run Hermes Agent on Kubernetes, community-powered, lightweight
  
  Run Hermes Agent — a multi-provider LLM agent framework — on Kubernetes. Configure any provider Hermes supports (OpenAI, Anthropic, Gemini, OpenRouter, NVIDIA, or any OpenAI-compatible proxy such as LiteLLM/vLLM) entirely via values.yaml, with a built-in helm test health check.
type: application

# Chart version (bump on chart changes).
version: 0.1.1

# Upstream Hermes Agent image version this chart targets by default.
# Date-based tag; corresponds to Hermes Agent v0.16.0 (2026.6.5).
appVersion: "v2026.6.5"

keywords:
  - hermes
  - agent
  - llm
  - openai-compatible

home: https://github.com/jyje/hermes-agent-helm
sources:
  - https://github.com/jyje/hermes-agent-helm
  - https://github.com/NousResearch/hermes-agent
maintainers:
  - name: jyje
    email: jyjeon@outlook.com

# Artifact Hub metadata (for future publishing to artifacthub.io).
annotations:
  artifacthub.io/category: ai-machine-learning
  artifacthub.io/license: MIT
  artifacthub.io/changes: |
    - kind: added
      description: Added install/changelog/contributors release notes template
    - kind: changed
      description: Renamed rescan-changes workflow to use lightning bolt emoji
    - kind: removed
      description: Removed duplicate Contributors section from release notes
