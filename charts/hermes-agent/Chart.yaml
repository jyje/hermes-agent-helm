apiVersion: v2
name: hermes-agent
description: |
  Community-powered Hermes Agent on Kubernetes. This chart deploys the Hermes Agent,
  a versatile agent framework that can be configurable for any LLM provider Hermes
  supports (OpenAI, Anthropic, Gemini, OpenRouter, or any OpenAI-compatible proxy
  such as LiteLLM). config.yaml is managed via ConfigMap and the .env via Secret.
type: application

# Chart version (bump on chart changes).
version: 0.0.4

# Upstream Hermes Agent image version this chart targets by default.
# Date-based tag; corresponds to Hermes Agent v0.16.0 (2026.6.5).
appVersion: "v2026.6.5"

keywords:
  - hermes
  - agent
  - llm
  - openai-compatible

home: https://github.com/jyje/hermes-agent-helm
sources:
  - https://github.com/jyje/hermes-agent-helm
  - https://github.com/NousResearch/hermes-agent
maintainers:
  - name: jyje
    email: jyjeon@outlook.com

# Artifact Hub metadata (for future publishing to artifacthub.io).
annotations:
  artifacthub.io/category: ai-machine-learning
  artifacthub.io/license: MIT
  artifacthub.io/changes: |
    - kind: added
      description: Initial chart (StatefulSet/Deployment + ConfigMap + Secret) for Hermes Agent on any LLM provider.
