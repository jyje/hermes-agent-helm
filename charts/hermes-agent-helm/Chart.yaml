apiVersion: v2
name: hermes-agent-helm
description: |
  Hermes Agent on Kubernetes as a StatefulSet, wired to an OpenAI-compatible
  LLM provider (LiteLLM). config.yaml is managed via ConfigMap and the .env via
  Secret.
type: application

# Chart version (bump on chart changes).
version: 0.1.0

# Upstream Hermes Agent image version this chart targets by default.
# Date-based tag; corresponds to Hermes Agent v0.16.0 (2026.6.5).
appVersion: "v2026.6.5"

keywords:
  - hermes
  - agent
  - litellm
  - openai-compatible
  - statefulset

home: https://github.com/jyje/hermes-helm
sources:
  - https://github.com/jyje/hermes-helm
  - https://github.com/NousResearch/hermes-agent
maintainers:
  - name: jyje
    email: jyjeon@outlook.com

# Artifact Hub metadata (for future publishing to artifacthub.io).
annotations:
  artifacthub.io/category: ai-machine-learning
  artifacthub.io/license: MIT
  artifacthub.io/changes: |
    - kind: added
      description: Initial chart (StatefulSet + ConfigMap + Secret) wired to an OpenAI-compatible LiteLLM provider.
